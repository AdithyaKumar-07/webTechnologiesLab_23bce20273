<!DOCTYPE html>
<html>
<head>
  <title>AJAX Product Search</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    input {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }

    #results {
      margin-top: 20px;
    }

    .product {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    .loading {
      color: orange;
      font-weight: bold;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

<h2>Live Product Search</h2>

<input type="text" id="searchBox" placeholder="Search products...">

<div id="results"></div>

<script src="script.js"></script>

</body>
</html>
